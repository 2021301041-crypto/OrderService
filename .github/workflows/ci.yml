name: Spring Boot Maven CI with Wrapper

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Grant mvnw permission
        run: chmod +x ./mvnw

      - name: Build with Maven Wrapper
        run: ./mvnw clean package -DskipTests

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: order-service
          path: target/*.jar
# ci 과정 git -> docjer hub
      # 1. 로그인 먼저 (권장)
      - name: Login to Docker Hub
        run: |
          echo "Logging in to Docker Hub..."
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          echo "Docker login successful"

      # 2. 빌드 (계정명/이미지명:태그 형식으로 붙여서 작성)
      - name: Build Docker Image
        run: |
          echo "Building Docker image..."
          # 계정명 뒤에 /를 붙이고 공백 없이 이미지 이름을 적어야 합니다.
          docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service:latest .
          echo "Docker image built"

      # 3. 푸시
      - name: Push Docker Image
        run: |
          echo "Pushing Docker image to Docker Hub..."
          # 빌드할 때 쓴 이름과 똑같은 이름을 푸시합니다.
          docker push ${{ secrets.DOCKER_USERNAME }}/order-service:latest
          echo "Docker image push complete"